<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FITS Metadata Viewer</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 16px; }
    button { margin-right: 8px; padding: 8px 14px; }
    #status { margin: 10px 0; color: #444; }
    table { border-collapse: collapse; width: 100%; margin: 8px 0; }
    th, td { padding: 8px 10px; border: 1px solid #ccc; text-align: left; font-size: 0.9rem; }
    th { background: #e7f0ff; font-weight: bold; position: sticky; top: 0; z-index: 10; }
    #summary, #details { margin-top: 10px; overflow-x: auto; max-height: 500px; overflow-y: auto; border: 1px solid #ccc; }
  </style>
</head>
<body>
  <h1>FITS Metadata Viewer</h1>
  <p>Select a directory with .fit/.fits files; subdirectories are scanned recursively.</p>
  <button id="selectDir">Select Directory</button>
  <button id="scanBtn">Scan FITS</button>
  <button id="stopBtn" disabled>Stop Scan</button>
  <button id="organizeBtn" disabled>Organize Stacked Files</button>
  <button id="removejpgBtn" disabled>Remove .jpg Files</button>
  <div id="selectedPath" style="margin-top:10px; font-size:0.95rem; color:#333;"></div>
  <div id="status"></div>
  <div id="progressContainer" style="margin:10px 0; display:none;">
    <progress id="progressBar" value="0" max="100" style="width:100%; height:20px;"></progress>
    <div id="progressText" style="margin-top:5px; font-size:0.9rem;"></div>
  </div>

  <h2>Target Summary</h2>
  <div id="summary"></div>

  <h2>File-Level Details</h2>
  <div id="details"></div>

  <script src="renderer.js"></script>
</body>
</html>
