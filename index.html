<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FITS Metadata Viewer</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 16px; color: #000003de; background: #e0e0e0;}
    button { margin-right: 8px; padding: 8px 14px; }
    #status { margin: 10px 0; color: #444; }
    table { border-collapse: collapse; width: 100%; margin: 8px 0; }
    th, td { padding: 8px 10px; border: 1px solid #bbbbbb; text-align: left; font-size: 0.9rem; }
    th { background: #9cc8f1; font-weight: bold; position: sticky; top: 0; z-index: 10; }
    #summary, #details { margin-top: 10px; overflow-x: auto; max-height: 500px; overflow-y: auto; border: 1px solid #ccc; }

/* Advanced Tools — no layout gap when closed */
#advancedBox {
  max-width: 600px;
  overflow: hidden;

  /* Remove layout footprint when closed */
  height: 0;
  padding: 0;
  border: 0;
  margin-top: 0;

  background: #d4d4d4;
  border-radius: 6px;

  transform-origin: top;
  transform: scaleY(0);
  opacity: 0;

  transition:
    transform 0.25s ease,
    opacity 0.25s ease,
    height 0s linear 0.25s,
    padding 0s linear 0.25s,
    border-width 0s linear 0.25s,
    margin-top 0s linear 0.25s;
}

#advancedBox.open {
  /* Restore natural layout footprint */
  height: auto;
  padding: 12px;
  border: 2px solid #888;
  margin-top: 16px;

  transform: scaleY(1);
  opacity: 1;

  transition:
    transform 0.25s ease,
    opacity 0.25s ease;
}

  </style>
</head>
<body>
  <h1>FITS Metadata Viewer</h1>
  <p>Select a directory with .fit files; subdirectories are automatically scanned.</p>

  <button id="selectDir" title="Select a directory to scan and process.">Select Directory</button>
  <button id="scanBtn" title="Start scanning the selected directory for FITS files.">Scan FIT</button>
  <button id="stopBtn" title="Cancels the currently running operation."  disabled>Stop</button>

  <!--  Toggle Button -->
  <button id="toggleAdvanced" title="Show/Hide Advanced Options" style="margin-top:16px;">
    Show Advanced Tools
  </button>

  <!--  Hidden Advanced Tools Box -->
  <div id="advancedBox">
    <h3 style="margin-top:0;">Advanced Features</h3>

    <button id="organizeBtn" title="Organize the scanned Stacked/DSO_Stacked FITS files into a /Stacked_ directory." disabled>Organize Stacked Files</button>
    <button id="removejpgBtn" title="Remove all jpg & jpeg files from the selected directory in an effort to save disk space. Must be used with caution." disabled>Remove .jpg Files</button>
    <button id="sirilprepBtn" title="Moves files into a subdirectory within Object folders based on light, dark, flat, or bias." disabled>Siril Prep</button>
    <button id="removeemptyBtn" title="Remove empty folders from the selected directory." disabled>Remove Empty Folders</button>
  </div>

  <div id="selectedPath" style="margin-top:10px;"></div>
  <div id="status"></div>

  <div id="progressContainer" style="margin:10px 0; display:none;">
    <progress id="progressBar" value="0" max="100" style="width:100%; height:20px;"></progress>
    <div id="progressText" style="margin-top:5px;"></div>
  </div>

  <h2>Target Summary</h2>
  <div id="summary"></div>

  <!-- Catalog Summary -->
  <h2>Catalog Breakdown</h2>
  <div id="catalogBreakdown" style="
    margin-top: 10px;
    overflow-x: auto;
    max-height: 500px;
    overflow-y: auto;
    border: 1px solid #ccc;
  "></div>

  <h2>Calibration Frames</h2>
  <div id="calibrationSummary" style="
    margin-top: 10px;
    overflow-x: auto;
    max-height: 400px;
    overflow-y: auto;
    border: 1px solid #ccc;
  "></div>

  <h2>File-Level Details</h2>
  <div id="details"></div>

  <!--  Toggle Script -->
  <script>
    const toggleBtn = document.getElementById('toggleAdvanced');
    const advancedBox = document.getElementById('advancedBox');

    toggleBtn.addEventListener('click', () => {
      const isOpen = advancedBox.classList.toggle('open');
      toggleBtn.textContent = isOpen ? 'Hide Advanced Features' : 'Show Advanced Features';
    });
  </script>

  <script src="renderer.js"></script>
</body>
</html>
